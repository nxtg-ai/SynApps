id: data-pipeline
name: Data Pipeline
description: >
  Scheduled ETL pipeline: fetch data from an external API on a cron schedule,
  reshape with Transform, and persist the result in memory store for downstream
  consumers. Configure DATA_API_URL, DATA_API_KEY, and CRON_SCHEDULE as variables.
tags:
  - data
  - pipeline
  - etl
  - scheduled

variables:
  DATA_API_URL: ""
  DATA_API_KEY: ""
  CRON_SCHEDULE: "0 * * * *"

nodes:
  - id: scheduler
    type: scheduler
    position: { x: 300, y: 25 }
    data:
      label: Hourly Trigger
      cron: "{{CRON_SCHEDULE}}"
      description: Fires on the configured cron schedule (default every hour)

  - id: fetch
    type: http_request
    position: { x: 300, y: 150 }
    data:
      label: Fetch Data
      method: GET
      url: "{{DATA_API_URL}}"
      headers:
        Accept: application/json
        X-Api-Key: "{{DATA_API_KEY}}"
      timeout_seconds: 30
      auth_type: none
      max_retries: 3
      allow_redirects: true
      verify_ssl: true

  - id: reshape
    type: transform
    position: { x: 300, y: 300 }
    data:
      label: Reshape Data
      operation: json_path
      json_path: $.data
      description: >
        Extract and reshape the payload — adjust json_path for your API response

  - id: store
    type: memory
    position: { x: 300, y: 450 }
    data:
      label: Store Result
      operation: store
      key: pipeline-latest
      namespace: data-pipeline
      description: Persist the transformed data for downstream consumers

  - id: end
    type: end
    position: { x: 300, y: 575 }
    data:
      label: End

edges:
  - id: scheduler-fetch
    source: scheduler
    target: fetch

  - id: fetch-reshape
    source: fetch
    target: reshape

  - id: reshape-store
    source: reshape
    target: store

  - id: store-end
    source: store
    target: end
